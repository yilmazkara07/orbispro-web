<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ORBIS – Klinik iş akışı ve operasyon düzeni platformu. Tanıtım önizlemesi." />
  <title>ORBIS | Tanıtım Önizlemesi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #04091A;
      color: rgba(255,255,255,0.82);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ── NAVBAR ── */
    .navbar {
      padding: 14px 24px;
      display: flex;
      align-items: center;
      background: linear-gradient(180deg, rgba(4,9,26,0.95) 60%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar__logo-img {
      height: 42px;
      width: auto;
      object-fit: contain;
      mix-blend-mode: screen;
    }

    .navbar__label {
      margin-left: auto;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,200,224,0.7);
    }

    /* ── MAIN ── */
    .preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 60px;
      position: relative;
      overflow: hidden;
    }

    /* background decorations */
    .preview__glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }
    .preview__glow--1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #00C8E0 0%, transparent 70%);
      top: -150px; left: -200px;
    }
    .preview__glow--2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #1B4D8C 0%, transparent 70%);
      bottom: -120px; right: -160px;
    }
    .preview__grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,224,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,224,0.04) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
    }

    .preview__inner {
      position: relative;
      max-width: 680px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .preview__symbol-img {
      width: clamp(120px, 18vw, 180px);
      height: auto;
      filter: drop-shadow(0 0 32px rgba(0,200,224,0.35)) drop-shadow(0 0 64px rgba(0,100,200,0.2));
      animation: symbolFloat 6s ease-in-out infinite;
    }

    @keyframes symbolFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .preview__eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #00C8E0;
    }

    .preview__title {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: rgba(255,255,255,0.94);
    }

    .preview__sub {
      font-size: 1rem;
      color: rgba(255,255,255,0.52);
      max-width: 480px;
      line-height: 1.8;
    }

    .preview__back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 26px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: transparent;
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,200,224,0.3);
      transition: all 0.22s ease;
      cursor: pointer;
    }
    .preview__back:hover {
      background: rgba(0,200,224,0.08);
      border-color: rgba(0,200,224,0.6);
      color: #fff;
    }

    /* ── FOOTER ── */
    .footer {
      padding: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .footer__logo {
      height: 28px;
      width: auto;
      object-fit: contain;
      mix-blend-mode: screen;
      opacity: 0.65;
    }

    .footer__note {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    @media (max-width: 600px) {
      .preview { padding: 60px 20px 48px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <a href="index.html" aria-label="ORBIS ana sayfa">
      <img
        src="https://github.com/user-attachments/assets/0efd032a-115d-4190-86d2-e473109f8397"
        alt="ORBIS"
        class="navbar__logo-img"
        width="130"
        height="52"
      />
    </a>
    <span class="navbar__label">ORBIS TANITIM SUNUMU</span>
  </header>

  <!-- PREVIEW -->
  <main class="preview">
    <div class="preview__glow preview__glow--1" aria-hidden="true"></div>
    <div class="preview__glow preview__glow--2" aria-hidden="true"></div>
    <div class="preview__grid" aria-hidden="true"></div>

    <div class="preview__inner">

      <img
        src="https://github.com/user-attachments/assets/7e703402-87b5-4c99-a159-5ee0175435ce"
        alt="ORBIS sembolü"
        class="preview__symbol-img"
        width="180"
        height="180"
      />

      <p class="preview__eyebrow">Klinik Kullanım Düzeni</p>

      <h1 class="preview__title">ORBIS</h1>

      <p class="preview__sub">
        Klinik iş akışı ve operasyon düzeni platformu.<br>
        Tanıtım önizlemesi yayınlanmaktadır.
      </p>

      <a href="index.html" class="preview__back">← Ana Sayfaya Dön</a>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <img
      src="https://github.com/user-attachments/assets/0efd032a-115d-4190-86d2-e473109f8397"
      alt="ORBIS"
      class="footer__logo"
      width="88"
      height="35"
    />
    <p class="footer__note">Tanıtım önizlemesi</p>
  </footer>

</body>
</html>
